name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: matrix.use_cross
        with:
          tool: cross

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build dashboard
        working-directory: frontend
        run: trunk build --release

      - name: Build
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/swarm"
          if command -v strip >/dev/null 2>&1; then
            strip "$BIN" || true
          fi

      - name: Package
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="swarm-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" swarm
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checksum
        id: checksum
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${{ steps.package.outputs.archive }}" > "${{ steps.package.outputs.archive }}.sha256"
          else
            sha256sum "${{ steps.package.outputs.archive }}" > "${{ steps.package.outputs.archive }}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cat *.sha256 | sort -k2 > SHA256SUMS

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          checksum() {
            awk -v archive="$1" '$2 == archive { print $1; exit }' SHA256SUMS
          }

          DARWIN_ARM_SHA="$(checksum "swarm-${VERSION}-aarch64-apple-darwin.tar.gz")"
          DARWIN_X64_SHA="$(checksum "swarm-${VERSION}-x86_64-apple-darwin.tar.gz")"
          LINUX_ARM_SHA="$(checksum "swarm-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")"
          LINUX_X64_SHA="$(checksum "swarm-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")"

          test -n "$DARWIN_ARM_SHA"
          test -n "$DARWIN_X64_SHA"
          test -n "$LINUX_ARM_SHA"
          test -n "$LINUX_X64_SHA"

          cat > swarm.rb <<EOF
          class Swarm < Formula
            desc "Durable local coordinator for LLM coding harnesses"
            homepage "https://github.com/sjalq/swarm"
            license "MIT OR Apache-2.0"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/sjalq/swarm/releases/download/v#{version}/swarm-#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"
              end

              on_intel do
                url "https://github.com/sjalq/swarm/releases/download/v#{version}/swarm-#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${DARWIN_X64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/sjalq/swarm/releases/download/v#{version}/swarm-#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              end

              on_intel do
                url "https://github.com/sjalq/swarm/releases/download/v#{version}/swarm-#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "swarm"
            end

            test do
              assert_match "swarm", shell_output("#{bin}/swarm --help")
            end
          end
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            swarm-*.tar.gz
            SHA256SUMS
            swarm.rb
